<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CoreLight : système RGB réactif Arduino – ambiance cyberpunk immersive">
    <meta property="og:title" content="CoreLight – Neon Protocol">
    <meta property="og:description" content="Système RGB audio-réactif Arduino – WS2812B, ventilateurs synchronisés, ambiance cyberpunk.">
    <meta property="og:type" content="website">
    <title>CoreLight – PROTOCOL INITIALIZATION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Aller au contenu principal</a>

    <canvas id="bg-anim" class="bg-anim-canvas" aria-hidden="true"></canvas>
    <!-- FIX: Lightened overlays for index page (storm bg needs to show through) -->
    <div class="crt-overlay index-crt-overlay" aria-hidden="true"></div>
    <div class="vignette index-vignette" aria-hidden="true"></div>

    <header class="header" role="banner">
        <div class="logo">
            <img src="./logo.png" alt="CoreLight" class="logo-glitch" width="90" height="90">
        </div>
        <div class="theme-wrap">
            <label for="theme-select" class="theme-label">Thème&nbsp;:</label>
            <select id="theme-select" class="theme-select">
                <option value="cyan">Cyan</option>
                <option value="pink">Rose</option>
                <option value="green">Vert</option>
                <option value="purple">Violet</option>
            </select>
        </div>
    </header>

    <main class="hero" id="main-content">
        <h1 class="glitch" data-text="CORE_LIGHT">
            CORE_LIGHT
        </h1>

        <div class="subtitle-wrapper">
            <p class="subtitle glitch-small" data-text="NEON PROTOCOL v0.7">NEON PROTOCOL v0.7</p>
            <p class="status-line">SYSTEM ONLINE — AWAITING MATRIX ACCESS</p>
        </div>

        <p class="description">
            Audio-réactif. WS2812B. Ventilateurs synchronisés.<br>
            Plongez dans la grille néon.
        </p>

        <a href="./dashboard.html" class="neon-button glitch-button">
            <span>ENTER THE GRID</span>
            <div class="button-glitch-layer"></div>
        </a>
    </main>

    <footer class="terminal-footer" role="contentinfo">
        <p>© 2026 CoreLight Industries — Made in Valais<br>
        <a href="https://www.instagram.com/corelight.rgblabs/" target="_blank" rel="noopener noreferrer">Instagram : @corelight.rgblabs</a></p>
    </footer>

    <script src="./script.js"></script>
    <script src="./storm-anim.js"></script>
</body>
</html>
